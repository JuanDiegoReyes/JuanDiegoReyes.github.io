<html>
    <head>
        <title>Examen - Unidad 3</title>
        <meta charset="utf-8">
        <meta name="author" content="Juan Diego Reyes Fraga">
        <meta name="revised" content="">
        <meta name="description" content="">
        <style>
            h1{
                background-color: aqua;
                color: black;
                text-align: center;
            }
            table{
                width: 200px;
                height: 200px;
                background-color: azure;
                border-color: aquamarine;
            }
            th{
                color: greenyellow;
            }
            input{
                text-decoration-color: black;
                width: max-content;
                height: max-content;
            }
        </style>
    </head>
    <body>
        <h1>~~~JavaScript - Calculadora~~~</h1>
        <table border="6" class="Calculadora" align="center">
            <tr><th colspan="12" ><input type="button" readonly id="varResultado"></th></tr>
            <tr>
                <th colspan="3" ><input type="button" value="1" id="var_1" onclick="Concat(var_1)"></th>
                <th colspan="3" ><input type="button" value="2" id="var_2" onclick="Concat(var_2)"></th>
                <th colspan="3" ><input type="button" value="3" id="var_3" onclick="Concat(var_3)"></th>
                <th colspan="3" ><input type="button" value="+" id="varMas" onclick="Concat(varMas)"></th>
            </tr>
            <tr>
                <th colspan="3" ><input type="button" value="4" id="var_4" onclick="Concat(var_4)"></th>
                <th colspan="3" ><input type="button" value="5" id="var_5" onclick="Concat(var_5)"></th>
                <th colspan="3" ><input type="button" value="6" id="var_6" onclick="Concat(var_6)"></th>
                <th colspan="3" ><input type="button" value="-" id="varMenos" onclick="Concat(varMenos)"></th>
            </tr>
            <tr>
                <th colspan="3" ><input type="button" value="7" id="var_7" onclick="Concat(var_7)"></th>
                <th colspan="3" ><input type="button" value="8" id="var_8" onclick="Concat(var_8)"></th>
                <th colspan="3" ><input type="button" value="9" id="var_9" onclick="Concat(var_9)"></th>
                <th colspan="3" ><input type="button" value="*" id="varPor" onclick="Concat(varPor)"></th>
            </tr>
            <tr>
                <th colspan="3" ><input type="button" value="0" id="var_0" onclick="Concat(var_0)"></th>
                <th colspan="3" ><input type="button" value="." id="varPunto" onclick="Concat(varPunto)"></th>
                <th colspan="3" ><input type="button" value="=" id="varResultado" onclick="Resultado(varResultado)"></th>
                <th colspan="3" ><input type="button" value="/" id="varEntre" onclick="Concat(varEntre)"></th>
            </tr>
            <tr>
                <th colspan="12" ><input type="button" value="Clear all" onclick="limpiar();"></th>
            </tr>
            <script>
                function Concat(varLet){
                    document.getElementById('varResultado').value+=(varLet).value;
                }
                function limpiar(){
                    document.getElementById('varResultado').value=('')
                }
                function Resultado(){
                    document.getElementById('varResultado').value=document.getElementById('varResultado').eval;
                }
            </script>
        </table>
    </body>

</html>
