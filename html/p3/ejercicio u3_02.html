        <script>
            /* 2.1.1.19 Variables - Tareas*/
            const precioRosa=8;
            const LirCosto=10;
            const tulipValor=2;
            let numsRosa=70,totalRosa;
            let cantLir=50, importeLirio;
            let tulipExitencias=120, tulipanTot;

            
            function calcular(){
                totalRosa=precioRosa*numsRosa;
            importeLirio= LirCosto*cantLir;
            tulipanTot=tulipExitencias*tulipValor;
            Total=importeLirio+totalRosa+tulipanTot;
            }
            
            function imprime(){
                alert("Rosa >> Precio: $"+precioRosa+" Cantidad: "+numsRosa+" Importe: $" +totalRosa+
            "\nLirio >> Precio: $"+LirCosto+" Cantidad: "+cantLir+" Importe: $" +importeLirio+
            "\nTulipán >> Precio: $"+tulipValor+" Cantidad: "+tulipExitencias+" Importe: $" +tulipanTot+
            "\n\nTotal: $"+Total);
            }
            calcular();
            imprime();
            numsRosa-=20;
            cantLir-=30;
            calcular();
            imprime();

            tulipExitencias-=60;
            calcular();
            imprime();
        </script>
