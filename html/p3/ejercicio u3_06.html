    <body>
        <h1 class="Tit">JavaScript-Operadores e Interacción con el usuario</h1>
        <script>
            /*4.1.1.11 Tareas: Condicionales*/
            let varNum=prompt("Introduce el valor para jugar....");
            varNum = varNum?varNum: "0";

            //Tarea No.1
            if (varNum>90&&varNum<110) {alert("¡Bingo!");}
            else {alert("¡Fallaste!");}

            //Tarea No.2
            let varResult = (varNum>90&&varNum<110)? "¡Loteria!:)":"¡Perdiste!:)";
            alert(varResult)

            //Tarea No.3
            let varNum1=prompt("Valor del primer operando");
            let varNum2=prompt("Valor del segundo operando");
            let varOp=prompt("Operación a realizar (+,-,*,/):");

            varNum1= Number.parseInt(varNum1, 10);
            varNum2= Number.parseInt(varNum2, 10);

            let varRes="";

            if (Number.isNaN(varNum1)|| Number.isNaN(varNum2)){
                VarRes= "Los operadores deben ser numeros...."
                }
                else{
                    switch(varOp){
                        case '+':
                            varRes = "El resultado de ("+ varNum1+ " + "+ varNum2 + ") es igual a : "+(varNum1+varNum2);
                            break;
                        case '-':
                            varRes = "El resultado de ("+ varNum1+ " - "+ varNum2 + ") es igual a : "+(varNum1-varNum2);
                            break;
                        case '*':
                            varRes = "El resultado de ("+ varNum1+ " * "+ varNum2 + ") es igual a : "+(varNum1*varNum2);
                            break;
                        case '/':
                            varRes = "El resultado de ("+ varNum1+ " / "+ varNum2 + ") es igual a : "+(varNum1/varNum2);
                            break;
                        default:varRes="Operación incorrecta.......";
                    }
                }
                
                alert(varRes);
        </script>
    </body>
