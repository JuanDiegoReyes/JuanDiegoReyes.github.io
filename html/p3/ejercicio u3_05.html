    <body>
        <h1 class="Tit">JavaScript-Operadores e Interacción con el usuario</h1>
        <script>
            /*3.3.1.7 Interacción con el usuario - Tareas*/
            let VarAnchura= prompt("Introduce el valor para la anchura de la caja.....");
            let VarAltura= prompt("Introduce el valor para la altura de la caja.....");
            let VarLogitud= prompt("Introduce el valor para la longitud de la caja.....");

            let bandAncho,bandAlto,bandLargo;


            bandAncho=VarAnchura?true:false;
            let strError="Los siguientes valores no son correctos: "
            bandAlto=VarAltura?true:false;
            bandLargo=VarLogitud?true:false;
            if(!bandAlto){
                strError+="\n -Altura";
            }
            if(!bandAncho){
                strError+="\n -Anchura";
            }
            if(!bandLargo){
                strError+="\n -Longitud";
            }

            if(bandAlto&&bandAncho&&bandLargo){
                alert("El volumen de la caja es: " + (VarAnchura*VarAltura*VarLogitud) + " unidades cubicas");
            }else{
                alert(strError);
            }

        </script>
    </body>
